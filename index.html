<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI R US Internship Onboarding Form</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1,h2{
text-align:center;
}

.required:after{
content:" *";
color:red;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;
}

textarea{
min-height:70px;
}

.checkbox-group{
display:grid;
grid-template-columns:1fr 1fr;
row-gap:6px;
}

.radio-group{
display:flex;
gap:20px;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th,table td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

button{
margin-top:25px;
padding:12px 40px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:30px;
}

</style>
</head>

<body>

<form id="enrollForm">

<div class="container">

<h1>AI R US</h1>
<h2>Internship On-Boarding Form</h2>

<p style="color:red;text-align:center;">
* Indicates mandatory fields
</p>

<h2>1. Personal Details</h2>

<label class="required">Full Name</label>
<input type="text" name="fullName" required>

<label class="required">Date of Birth</label>
<input type="date" name="dob" required>

<label class="required">Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label class="required">Contact Number</label>
<input type="tel"
name="contact"
maxlength="10"
pattern="[0-9]{10}"
inputmode="numeric"
required
oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)">

<label class="required">Email</label>
<input type="email" name="email" id="email" required>

<label class="required">Aadhaar Number</label>
<input type="text"
name="aadhaar"
maxlength="12"
pattern="[0-9]{12}"
inputmode="numeric"
required
oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,12)">

<h3>Address</h3>

<label>House</label>
<input type="text" name="house">

<label>Street</label>
<input type="text" name="street">

<label>City</label>
<input type="text" name="city">

<label>District</label>
<input type="text" name="district">

<label>State</label>
<input type="text" name="state">

<label>Pincode</label>
<input type="text"
name="pincode"
maxlength="6"
pattern="[0-9]{6}"
inputmode="numeric"
required
oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,6)">

<h2>2. Internship Details</h2>

<label>Internship Domain</label>

<div class="checkbox-group">
<label><input type="checkbox" name="domain[]" value="AI">AI</label>
<label><input type="checkbox" name="domain[]" value="Cloud">Cloud</label>
<label><input type="checkbox" name="domain[]" value="Java">Java</label>
<label><input type="checkbox" name="domain[]" value="Python">Python</label>
<label><input type="checkbox" name="domain[]" value="Web">Web</label>
<label><input type="checkbox" name="domain[]" value="MERN">MERN</label>
</div>

<label>Internship Type</label>

<div class="radio-group">
<label><input type="radio" name="type" value="Online" required>Online</label>
<label><input type="radio" name="type" value="Offline">Offline</label>
<label><input type="radio" name="type" value="Hybrid">Hybrid</label>
</div>

<label>Start Date</label>
<input type="date" name="startDate">

<label>End Date</label>
<input type="date" name="endDate">

<h2>3. Document Upload</h2>

<label>Aadhaar PDF</label>
<input type="file" name="aadhaarFile" accept=".pdf" required>

<label>PAN PDF</label>
<input type="file" name="panFile" accept=".pdf" required>

<label>College ID</label>
<input type="file" name="collegeFile" accept=".pdf" required>

<label>Resume</label>
<input type="file" name="resumeFile" accept=".pdf" required>

<label>SSLC</label>
<input type="file" name="sslcFile" accept=".pdf" required>

<label>PUC</label>
<input type="file" name="pucFile" accept=".pdf" required>

<label>All Sem Marks</label>
<input type="file" name="semesterFile" accept=".pdf" required>

<label>Photo</label>
<input type="file" name="photoFile" accept=".pdf" required>

<div style="text-align:center;">
<button type="submit">Submit</button>
</div>

</div>

</form>

<div class="footer">
AI R US<br>
Shivamogga – 577201<br>
📞 7676749499
</div>

<script>

const scriptURL="PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL";

document.getElementById("enrollForm").addEventListener("submit",async function(e){

e.preventDefault();

function toBase64(file){
return new Promise((resolve,reject)=>{
let reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>resolve(reader.result.split(',')[1]);
reader.onerror=error=>reject(error);
});
}

const form=e.target;

const data={

fullName:form.fullName.value,
dob:form.dob.value,
gender:form.gender.value,
contact:form.contact.value,
email:form.email.value,
aadhaar:form.aadhaar.value,

house:form.house.value,
street:form.street.value,
city:form.city.value,
district:form.district.value,
state:form.state.value,
pincode:form.pincode.value,

domain:[...document.querySelectorAll("input[name='domain[]']:checked")].map(x=>x.value).join(","),

type:document.querySelector("input[name='type']:checked")?.value,

startDate:form.startDate.value,
endDate:form.endDate.value,

aadhaarFile:await toBase64(form.aadhaarFile.files[0]),
panFile:await toBase64(form.panFile.files[0]),
collegeFile:await toBase64(form.collegeFile.files[0]),
resumeFile:await toBase64(form.resumeFile.files[0]),
sslcFile:await toBase64(form.sslcFile.files[0]),
pucFile:await toBase64(form.pucFile.files[0]),
semesterFile:await toBase64(form.semesterFile.files[0]),
photoFile:await toBase64(form.photoFile.files[0])

};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{
alert("Form submitted successfully");
form.reset();
})
.catch(err=>{
alert("Submission failed");
});

});

</script>

</body>
</html>
